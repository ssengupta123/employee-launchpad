<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reason Agent</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
    #webchat { height: 100%; width: 100%; }
    #status { display: flex; align-items: center; justify-content: center; height: 100%; color: #666; font-size: 14px; flex-direction: column; gap: 12px; }
    .spinner { width: 28px; height: 28px; border: 3px solid #e0e0e0; border-top-color: #2AABB3; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="webchat">
    <div id="status"><div class="spinner"></div><span>Connecting to Reason Agent...</span></div>
  </div>
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <script>
    async function initChat() {
      try {
        var res = await fetch("/api/copilot/token", { credentials: "include" });
        if (!res.ok) throw new Error("Token fetch failed: " + res.status);
        var data = await res.json();
        if (!data.token) throw new Error("No token in response");

        var directLine = window.WebChat.createDirectLine({
          token: data.token,
          domain: "https://australia.directline.botframework.com/v3/directline"
        });

        var store = window.WebChat.createStore({}, function(context) {
          return function(next) {
            return function(action) {
              if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
                context.dispatch({
                  type: "WEB_CHAT/SEND_EVENT",
                  payload: { name: "startConversation", type: "event" }
                });
              }
              return next(action);
            };
          };
        });

        window.WebChat.renderWebChat({
          directLine: directLine,
          store: store,
          locale: "en-AU",
          styleOptions: {
            hideUploadButton: false,
            botAvatarBackgroundColor: "#2AABB3",
            botAvatarInitials: "RG",
            userAvatarBackgroundColor: "#1a1a1a",
            userAvatarInitials: "You",
            bubbleBackground: "#f0f0f0",
            bubbleBorderRadius: 12,
            bubbleFromUserBackground: "#2AABB3",
            bubbleFromUserTextColor: "#ffffff",
            bubbleFromUserBorderRadius: 12,
            rootHeight: "100%",
            rootWidth: "100%",
            sendBoxButtonColor: "#2AABB3",
            sendBoxButtonColorOnFocus: "#1a8a91",
            sendBoxButtonColorOnHover: "#1a8a91"
          }
        }, document.getElementById("webchat"));

        document.getElementById("status")?.remove();
      } catch (err) {
        var el = document.getElementById("status");
        if (el) el.innerHTML = '<span style="color:#e44;">Failed to connect. Please try again.</span>';
        console.error("Chat error:", err);
      }
    }

    initChat();
  </script>
</body>
</html>
