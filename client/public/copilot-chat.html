<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reason Agent</title>
  <script crossorigin="anonymous" src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #webchat { height: 100%; width: 100%; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #666; font-size: 14px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #2AABB3; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="webchat"><div id="loading"><div class="spinner"></div>Connecting...</div></div>
  <script>
    const BOT_ID = "cr8c8_reasonAgent";
    const TOKEN_URL = "https://default1d2442c2bedd4c24957ccb3e90333a.b3.environment.api.powerplatform.com/powervirtualagents/botsbyschema/" + BOT_ID + "/directline/token?api-version=2022-03-01-preview";

    async function initChat() {
      try {
        const res = await fetch(TOKEN_URL);
        const data = await res.json();

        const store = window.WebChat.createStore({}, function(_ref) {
          var dispatch = _ref.dispatch;
          return function(next) {
            return function(action) {
              if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
                dispatch({ type: "WEB_CHAT/SEND_EVENT", payload: { name: "startConversation", type: "event" } });
              }
              return next(action);
            };
          };
        });

        window.WebChat.renderWebChat({
          directLine: window.WebChat.createDirectLine({ token: data.token }),
          store: store,
          styleOptions: {
            hideUploadButton: false,
            botAvatarBackgroundColor: "#2AABB3",
            botAvatarInitials: "RG",
            userAvatarBackgroundColor: "#1a1a1a",
            userAvatarInitials: "You",
            bubbleBackground: "#f0f0f0",
            bubbleBorderRadius: 12,
            bubbleFromUserBackground: "#2AABB3",
            bubbleFromUserTextColor: "#ffffff",
            bubbleFromUserBorderRadius: 12,
            rootHeight: "100%",
            rootWidth: "100%"
          }
        }, document.getElementById("webchat"));
      } catch (err) {
        document.getElementById("loading").textContent = "Failed to connect. Please try again.";
        console.error("Chat init error:", err);
      }
    }

    initChat();
  </script>
</body>
</html>
